services:
  postgres:
    image: postgres:16-alpine
    container_name: shengduoduo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_saas"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
